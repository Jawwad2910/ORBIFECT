<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORBIFECT | Intelligence Terminal</title>
    <!-- Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --obsidian: #020202;
            --gold: #E8C84A;
            --alert: #FF4B2B;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(232, 200, 74, 0.15);
            --font-main: 'Roboto Mono', monospace;
            --font-head: 'Playfair Display', serif;
        }

        * { box-sizing: border-box; cursor: crosshair; }

        body, html {
            background-color: var(--obsidian);
            color: #ececec;
            font-family: var(--font-main);
            margin: 0;
            overflow: hidden;
            height: 100vh;
            text-transform: uppercase;
            font-size: 12px;
        }

        /* --- CYBER HANDSHAKE OVERLAY --- */
        #handshake {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s ease;
        }
        .matrix-text { color: var(--gold); font-size: 1.2rem; letter-spacing: 4px; }
        .glitch { animation: pulse 0.1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        /* --- LAYOUT ARCHITECTURE --- */
        .app-container {
            display: grid;
            grid-template-columns: 300px 1fr 350px;
            grid-template-rows: 40px 1fr;
            height: 100vh;
            border: 1px solid var(--border);
        }

        /* --- MAGNETIC TICKER --- */
        .ticker-container {
            grid-column: 1 / -1;
            background: #000;
            border-bottom: 1px solid var(--gold);
            display: flex;
            align-items: center;
            overflow: hidden;
            white-space: nowrap;
        }
        .ticker-track {
            display: inline-block;
            animation: tickerSlide 40s linear infinite;
        }
        .ticker-item {
            display: inline-block;
            padding: 0 30px;
            color: var(--gold);
            text-shadow: 0 0 5px rgba(232, 200, 74, 0.5);
        }
        .ticker-item.drop { color: var(--alert); }
        @keyframes tickerSlide {
            from { transform: translateX(0); }
            to { transform: translateX(-50%); }
        }

        /* --- SIDEBAR: GLOBAL MATRIX --- */
        .sidebar-left {
            border-right: 1px solid var(--border);
            padding: 20px;
            background: linear-gradient(180deg, #050505 0%, #020202 100%);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .map-svg {
            width: 100%;
            fill: #1a1a1a;
            stroke: var(--gold);
            stroke-width: 0.5;
        }
        .map-svg path:hover {
            fill: var(--gold);
            transition: 0.3s;
            cursor: pointer;
        }

        /* --- MAIN FEED --- */
        .main-feed {
            overflow-y: scroll;
            padding: 20px;
            scrollbar-width: none;
        }
        .main-feed::-webkit-scrollbar { display: none; }

        .news-card {
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 15px;
            margin-bottom: 15px;
            backdrop-filter: blur(20px);
            transition: transform 0.2s, border 0.2s;
            view-transition-name: card;
        }
        .news-card:hover {
            border-color: var(--gold);
            transform: scale(1.01) translateZ(10px);
            background: rgba(232, 200, 74, 0.05);
        }
        .card-meta { color: var(--gold); font-size: 10px; margin-bottom: 8px; opacity: 0.7; }
        .card-title {
            font-family: var(--font-head);
            font-size: 1.4rem;
            margin: 0 0 10px 0;
            text-transform: none;
            line-height: 1.2;
        }

        /* --- AI VAULT --- */
        .sidebar-right {
            border-left: 1px solid var(--border);
            padding: 20px;
            background: #050505;
        }
        .vault-header {
            border-left: 3px solid var(--gold);
            padding-left: 10px;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .ai-analysis {
            font-size: 11px;
            line-height: 1.6;
            color: #bbb;
        }
        .ai-tag { color: var(--gold); font-weight: bold; margin-top: 15px; display: block; }

        /* --- COMMAND PALETTE --- */
        #commandPalette {
            position: fixed;
            top: 20%; left: 50%; transform: translate(-50%, -20%);
            width: 600px;
            background: #0a0a0a;
            border: 1px solid var(--gold);
            padding: 20px;
            box-shadow: 0 0 50px rgba(0,0,0,1);
            z-index: 10000;
            display: none;
        }
        #cmdInput {
            background: none; border: none; color: var(--gold);
            width: 100%; font-family: var(--font-main); font-size: 1.5rem;
            outline: none;
        }

        /* View Transitions Logic */
        ::view-transition-old(card) { opacity: 0; transform: translateY(-20px); }
        ::view-transition-new(card) { opacity: 1; transform: translateY(0); }

    </style>
</head>
<body>

    <div id="handshake">
        <div class="matrix-text" id="status-line">[ESTABLISHING SECURE TUNNEL...]</div>
    </div>

    <div class="app-container">
        <!-- Market Alpha Ticker -->
        <header class="ticker-container">
            <div class="ticker-track" id="tickerTrack">
                <!-- Ticker Content Generated by JS -->
            </div>
        </header>

        <!-- Sidebar Matrix -->
        <aside class="sidebar-left">
            <div class="vault-header">GLOBAL MATRIX</div>
            <svg class="map-svg" viewBox="0 0 1000 500">
                <path data-reg="americas" d="M250,150 L300,200 L250,350 L150,400 L100,250 Z" />
                <path data-reg="europe" d="M450,100 L550,100 L550,200 L450,200 Z" />
                <path data-reg="asia" d="M650,100 L850,150 L800,350 L600,300 Z" />
                <path data-reg="middle-east" d="M560,210 L620,210 L620,260 L560,260 Z" />
            </svg>
            <div class="ai-analysis" style="margin-top:auto;">
                <p>TERMINAL ID: OB-992</p>
                <p>ENCRYPTION: AES-256</p>
                <p>OPERATOR: J. ASGHAR</p>
            </div>
        </aside>

        <!-- Intelligence Feed -->
        <main class="main-feed" id="newsFeed">
            <!-- News items morph here -->
        </main>

        <!-- AI Vault -->
        <aside class="sidebar-right">
            <div class="vault-header">THE AI VAULT // STUDENT PULSE</div>
            <div id="aiVaultContent" class="ai-analysis">
                SELECT AN INTEL PACKET FOR DEEP ANALYSIS...
            </div>
        </aside>
    </div>

    <!-- Command Palette -->
    <div id="commandPalette">
        <div style="color:var(--gold); font-size: 10px; margin-bottom: 10px;">SYSTEM COMMAND EXECUTOR</div>
        <input type="text" id="cmdInput" placeholder="/topic [tech, ai, global]...">
    </div>

    <audio id="blip" src="https://actions.google.com/sounds/v1/science_fiction/low_interference_static.ogg"></audio>

    <script>
        // --- 1. CONFIGURATION & DATABASE ---
        const SB_URL = "https://fioilphrakfblmvcseef.supabase.co";
        const SB_KEY = "EyjhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpb2lscGhyYWtmYmxtdmNzZWVmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0MTE1OTUsImV4cCI6MjA4OTk4NzU5NX0._8oYT35T6zaaf25DPEvg4pTT0cBqTfhsgGQ2bvOSzlM";
        const supabase = window.supabase.createClient(SB_URL, SB_KEY);

        const SOURCES = [
            { cat: 'global', name: 'Reuters', url: 'https://www.reutersagency.com/feed/' },
            { cat: 'global', name: 'AP News', url: 'https://apnews.com/hub/world-news.rss' },
            { cat: 'global', name: 'BBC World', url: 'http://feeds.bbci.co.uk/news/world/rss.xml' },
            { cat: 'global', name: 'Al Jazeera', url: 'https://www.aljazeera.com/xml/rss/all.xml' },
            { cat: 'business', name: 'Bloomberg', url: 'https://www.bloomberg.com/feeds/podcasts/surveillance.xml' },
            { cat: 'business', name: 'Financial Times', url: 'https://www.ft.com/geopolitics?format=rss' },
            { cat: 'tech', name: 'TechCrunch', url: 'https://techcrunch.com/feed/' },
            { cat: 'tech', name: 'The Verge', url: 'https://www.theverge.com/rss/index.xml' },
            { cat: 'tech', name: 'AI News', url: 'https://www.artificialintelligence-news.com/feed/' },
            { cat: 'tech', name: 'OpenAI', url: 'https://openai.com/news/rss.xml' },
            { cat: 'geo', name: 'Stratfor', url: 'https://worldview.stratfor.com/rss.xml' },
            { cat: 'asia', name: 'SCMP Asia', url: 'https://www.scmp.com/rss/2/feed.xml' }
        ];

        let currentIntel = [];

        // --- 2. ENGINE CORE ---
        async function fetchAllIntel() {
            const feed = document.getElementById('newsFeed');
            const promises = SOURCES.map(src => 
                fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(src.url)}&api_key=4p3v1y7mqm6q6p6u0v7x6o4p3v1y7mqm6q6p6u0v`) // Extended proxy key
                .then(r => r.json())
                .catch(() => ({ items: [] }))
            );

            const results = await Promise.all(promises);
            currentIntel = results.flatMap((res, i) => 
                (res.items || []).map(item => ({...item, source: SOURCES[i].name, category: SOURCES[i].cat}))
            ).sort((a,b) => new Date(b.pubDate) - new Date(a.pubDate));

            renderIntel(currentIntel);
        }

        function renderIntel(data) {
            const feed = document.getElementById('newsFeed');
            
            const content = data.map(item => `
                <article class="news-card" onclick="openVault('${btoa(encodeURIComponent(item.title))}', '${btoa(encodeURIComponent(item.content || item.description))}')">
                    <div class="card-meta">${item.source} // ${item.pubDate} // ${item.category}</div>
                    <h2 class="card-title">${item.title}</h2>
                    <div class="ai-analysis">${item.description.substring(0, 120)}...</div>
                </article>
            `).join('');

            if (!document.startViewTransition) {
                feed.innerHTML = content;
            } else {
                document.startViewTransition(() => {
                    feed.innerHTML = content;
                });
            }
        }

        // --- 3. AI VAULT LOGIC ---
        function openVault(titleEnc, contentEnc) {
            const title = decodeURIComponent(atob(titleEnc));
            const desc = decodeURIComponent(atob(contentEnc));
            const vault = document.getElementById('aiVaultContent');
            const blip = document.getElementById('blip');
            
            blip.currentTime = 0;
            blip.play();

            vault.innerHTML = `
                <div class="glitch">[ANALYZING DATASTREAM...]</div>
            `;

            setTimeout(() => {
                vault.innerHTML = `
                    <span class="ai-tag">[CONTEXT]</span>
                    ${title}
                    
                    <span class="ai-tag">[IMPACT]</span>
                    Immediate market shift detected in the ${title.split(' ')[0]} sector. Geopolitical stability downgraded by 0.04%.
                    
                    <span class="ai-tag">[STUDENT TAKEAWAY]</span>
                    Focus on the supply chain implications. This isn't just news; it's a structural pivot for global ${title.split(' ')[1] || 'assets'}.
                `;
            }, 800);
        }

        // --- 4. COMMAND PALETTE & FILTERS ---
        window.addEventListener('keydown', e => {
            if (e.ctrlKey && e.key === 'k') {
                e.preventDefault();
                const cp = document.getElementById('commandPalette');
                cp.style.display = cp.style.display === 'block' ? 'none' : 'block';
                document.getElementById('cmdInput').focus();
            }
        });

        document.getElementById('cmdInput').addEventListener('keypress', e => {
            if (e.key === 'Enter') {
                const input = e.target.value.toLowerCase();
                const [cmd, val] = input.split(' ');
                
                if (cmd === '/topic' || cmd === '/region') {
                    const filtered = currentIntel.filter(i => i.category.includes(val) || i.title.toLowerCase().includes(val));
                    renderIntel(filtered);
                }
                
                document.getElementById('commandPalette').style.display = 'none';
                e.target.value = '';
            }
        });

        // --- 5. INITIALIZATION ---
        window.onload = () => {
            // Handshake Sequence
            const status = document.getElementById('status-line');
            setTimeout(() => status.innerText = "[ACCESS GRANTED: J. ASGHAR]", 800);
            setTimeout(() => {
                document.getElementById('handshake').style.opacity = '0';
                setTimeout(() => document.getElementById('handshake').remove(), 800);
            }, 1500);

            // Ticker Generation
            const ticker = document.getElementById('tickerTrack');
            const stocks = ["BTC $64,212 (+2.4%)", "XAU $2,182 (-0.4%)", "TSLA $175.22 (+1.2%)", "AAPL $182.10 (-0.2%)", "ETH $3,421 (+4.1%)"];
            ticker.innerHTML = stocks.map(s => `<span class="ticker-item ${s.includes('-') ? 'drop' : ''}">${s}</span>`).join('').repeat(10);

            // Load Data
            fetchAllIntel();

            // Region Map Listeners
            document.querySelectorAll('.map-svg path').forEach(path => {
                path.addEventListener('click', () => {
                    const reg = path.getAttribute('data-reg');
                    const filtered = currentIntel.filter(i => i.category === reg || i.source.toLowerCase().includes(reg));
                    renderIntel(filtered.length ? filtered : currentIntel);
                });
            });
        };
    </script>
</body>
</html>
