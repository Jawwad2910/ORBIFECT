<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORBIFECT | Intelligence Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --obsidian: #020202;
            --gold: #E8C84A;
            --alert: #FF4B2B;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(232, 200, 74, 0.2);
            --font-mono: 'Roboto Mono', monospace;
            --font-head: 'Playfair Display', serif;
        }

        * { box-sizing: border-box; cursor: crosshair; }

        body {
            background-color: var(--obsidian);
            color: #ececec;
            font-family: var(--font-mono);
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- TOP TICKER --- */
        .ticker-wrap {
            width: 100%;
            height: 35px;
            background: #000;
            border-bottom: 1px solid var(--border);
            overflow: hidden;
            display: flex;
            align-items: center;
            z-index: 100;
        }
        .ticker {
            display: inline-block;
            white-space: nowrap;
            animation: tickerFlow 40s linear infinite;
        }
        .ticker-item {
            display: inline-block;
            padding: 0 30px;
            font-size: 11px;
            color: var(--gold);
        }
        .ticker-item span.up { color: #00ff88; }
        .ticker-item span.down { color: var(--alert); }
        @keyframes tickerFlow {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* --- TERMINAL GRID --- */
        .terminal-grid {
            flex: 1;
            display: grid;
            grid-template-columns: 280px 1fr 320px;
            overflow: hidden;
        }

        /* Mobile Responsiveness */
        @media (max-width: 1100px) {
            .terminal-grid {
                grid-template-columns: 1fr;
                grid-template-rows: auto 1fr auto;
                overflow-y: auto;
            }
            .sidebar-left, .sidebar-right { height: auto; border: none; }
            body { overflow-y: auto; }
        }

        .pane {
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            background: var(--obsidian);
            padding: 15px;
            overflow-y: auto;
        }

        .sidebar-right { border-right: none; border-left: 1px solid var(--border); }

        .pane-title {
            font-size: 10px;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 8px;
            margin-bottom: 15px;
            font-weight: bold;
        }

        /* --- NEWS CARDS --- */
        .feed-container { padding: 10px; }
        .news-card {
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 18px;
            margin-bottom: 12px;
            transition: 0.3s;
            cursor: pointer;
            view-transition-name: card;
        }
        .news-card:hover {
            border-color: var(--gold);
            background: rgba(232, 200, 74, 0.05);
            transform: translateX(5px);
        }
        .card-meta { font-size: 9px; color: var(--gold); margin-bottom: 8px; }
        .card-title { font-family: var(--font-head); font-size: 1.4rem; margin: 0 0 10px; line-height: 1.2; }
        .card-desc { font-size: 12px; color: #aaa; line-height: 1.5; }

        /* --- AI VAULT --- */
        .vault-item { margin-bottom: 20px; animation: fadeIn 0.5s ease; }
        .vault-tag { color: var(--gold); font-size: 10px; font-weight: 700; display: block; margin-bottom: 4px; }
        .vault-text { font-size: 13px; line-height: 1.6; color: #ddd; }

        /* --- UI ELEMENTS --- */
        .matrix-map { width: 100%; fill: #111; stroke: var(--gold); stroke-width: 0.5; }
        .shimmer { 
            height: 100px; background: linear-gradient(90deg, #050505 25%, #111 50%, #050505 75%);
            background-size: 200% 100%; animation: loading 1.5s infinite; margin-bottom: 10px;
        }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); }
    </style>
</head>
<body>

    <div class="ticker-wrap">
        <div class="ticker" id="ticker">
            <div class="ticker-item">BTC/USD <span class="up">$64,231 ▲ 2.4%</span></div>
            <div class="ticker-item">GOLD <span class="down">$2,312 ▼ 0.4%</span></div>
            <div class="ticker-item">S&P 500 <span class="up">5,210 ▲ 1.1%</span></div>
            <div class="ticker-item">ORBIFECT-INT <span class="up">STABLE</span></div>
        </div>
    </div>

    <div class="terminal-grid">
        <!-- LEFT SIDEBAR -->
        <aside class="pane sidebar-left">
            <div class="pane-title">Global Matrix Map</div>
            <svg class="matrix-map" viewBox="0 0 100 50">
                <path d="M10,10 L30,10 L30,30 L10,30 Z" />
                <path d="M45,5 L65,5 L65,25 L45,25 Z" />
                <path d="M70,15 L90,15 L90,40 L70,40 Z" />
            </svg>
            <div style="margin-top:20px; font-size:10px; color:var(--gold); opacity:0.6;">
                > TERMINAL: ACTIVE<br>
                > ENCRYPTION: AES-256<br>
                > DATA SOURCES: 10/10<br>
                > LATENCY: 24ms
            </div>
        </aside>

        <!-- CENTER FEED -->
        <main class="pane" id="mainFeed">
            <div class="pane-title">Intelligence Stream</div>
            <div id="loading" style="display:block;">
                <div class="shimmer"></div>
                <div class="shimmer"></div>
                <div class="shimmer"></div>
            </div>
            <div id="feed" class="feed-container"></div>
        </main>

        <!-- RIGHT SIDEBAR (AI VAULT) -->
        <aside class="pane sidebar-right">
            <div class="pane-title">AI Vault // Student Pulse</div>
            <div id="vaultContent" class="vault-text" style="color:#666; font-size:11px;">
                SELECT AN INTEL PACKET FOR DEEP ANALYSIS...
            </div>
        </aside>
    </div>

    <script>
        // Supabase Configuration
        const supabase = window.supabase.createClient(
            "https://fioilphrakfblmvcseef.supabase.co",
            "EyjhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpb2lscGhyYWtmYmxtdmNzZWVmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0MTE1OTUsImV4cCI6MjA4OTk4NzU5NX0._8oYT35T6zaaf25DPEvg4pTT0cBqTfhsgGQ2bvOSzlM"
        );

        const FEEDS = [
            { name: "REUTERS", url: "https://www.reutersagency.com/feed/" },
            { name: "BBC WORLD", url: "http://feeds.bbci.co.uk/news/world/rss.xml" },
            { name: "AL JAZEERA", url: "https://www.aljazeera.com/xml/rss/all.xml" },
            { name: "TECHCRUNCH", url: "https://techcrunch.com/feed/" },
            { name: "WIRED", url: "https://www.wired.com/feed/rss" },
            { name: "CNBC", url: "https://www.cnbc.com/id/100727362/device/rss/rss.html" },
            { name: "BLOOMBERG", url: "https://www.bloomberg.com/feeds/podcasts/surveillance.xml" },
            { name: "AP NEWS", url: "https://apnews.com/hub/world-news.rss" },
            { name: "SCMP", url: "https://www.scmp.com/rss/2/feed.xml" },
            { name: "STRATFOR", url: "https://worldview.stratfor.com/rss.xml" }
        ];

        let masterIntel = [];

        async function fetchFeeds() {
            const feedContainer = document.getElementById('feed');
            const loading = document.getElementById('loading');
            const proxy = "https://api.allorigins.win/raw?url=";

            for (const feed of FEEDS) {
                try {
                    const response = await fetch(proxy + encodeURIComponent(feed.url));
                    const text = await response.text();
                    const parser = new DOMParser();
                    const xml = parser.parseFromString(text, "text/xml");
                    const items = xml.querySelectorAll("item");

                    items.forEach(item => {
                        masterIntel.push({
                            source: feed.name,
                            title: item.querySelector("title")?.textContent || "",
                            link: item.querySelector("link")?.textContent || "",
                            description: item.querySelector("description")?.textContent || "",
                            date: item.querySelector("pubDate")?.textContent || ""
                        });
                    });
                } catch (e) {
                    console.warn(`Failed to fetch ${feed.name}`);
                }
            }

            // Sort by Date
            masterIntel.sort((a, b) => new Date(b.date) - new Date(a.date));
            renderFeed(masterIntel);
            loading.style.display = 'none';
        }

        function renderFeed(data) {
            const feedContainer = document.getElementById('feed');
            feedContainer.innerHTML = data.map((intel, index) => `
                <div class="news-card" onclick="analyzeIntel(${index})">
                    <div class="card-meta">${intel.source} // ${new Date(intel.date).toLocaleTimeString()}</div>
                    <div class="card-title">${intel.title}</div>
                    <div class="card-desc">${cleanDescription(intel.description)}</div>
                </div>
            `).join('');
        }

        function cleanDescription(desc) {
            const temp = document.createElement("div");
            temp.innerHTML = desc;
            return (temp.textContent || temp.innerText || "").substring(0, 120) + "...";
        }

        function analyzeIntel(index) {
            const intel = masterIntel[index];
            const vault = document.getElementById('vaultContent');
            
            // Artificial delay to simulate AI processing
            vault.innerHTML = `<div class="shimmer" style="height:20px;"></div><p>PROCESING SECTOR DATA...</p>`;

            setTimeout(() => {
                const keywords = intel.title.split(' ').filter(w => w.length > 4);
                vault.innerHTML = `
                    <div class="vault-item">
                        <span class="vault-tag">[CONTEXT]</span>
                        <span class="vault-text">This report from ${intel.source} highlights shifts in the ${keywords[0] || 'Global'} sphere, specifically impacting regional stability.</span>
                    </div>
                    <div class="vault-item">
                        <span class="vault-tag">[IMPACT]</span>
                        <span class="vault-text">Immediate volatility expected in markets linked to ${keywords[1] || 'current'} developments. Geopolitical tension index: Elevated.</span>
                    </div>
                    <div class="vault-item">
                        <span class="vault-tag">[STUDENT TAKEAWAY]</span>
                        <span class="vault-text">Observe the correlation between ${intel.source}'s report and upcoming policy shifts. This is a primary indicator of structural ${keywords[2] || 'change'}.</span>
                    </div>
                `;
            }, 600);
        }

        // Initialize Ticker clones for infinite loop
        document.getElementById('ticker').innerHTML += document.getElementById('ticker').innerHTML;

        // Start Logic
        fetchFeeds();
    </script>
</body>
</html>
